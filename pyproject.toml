[build-system]
requires = [
    "setuptools>=60",
    "setuptools-scm>=8.0"]

[project]
name = "fact_reasoner"
version = "0.5.0"
description = "Factuality Assessment for Foundation Models"
authors = [
    {name = "Radu Marinescu",email = "radu.marinescu@ie.ibm.com"},
    {name = "Javier Carnerero Cano",email = "javier.cano@ibm.com"},
    {name = "Massimiliano Pronesti",email = "massimiliano.pronesti@ibm.com"},
]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.10"
classifiers=[
    "License :: OSI Approved :: Apache Software License"
]
dependencies = [
    "numpy>=1.22.4",
    "pandas>=1.5.0",
    "tqdm>=4.65.0",
    "nltk>=3.6.6",
    "protobuf",
    "sentencepiece",
    "python-dotenv",
    "matplotlib",
    "rank_bm25",
    "pgmpy",
    "spacy",
    "helper-utils",
    "langchain",
    "langchain-community",
    "wikipedia",
    "chromadb",
    "beautifulsoup4",
    "lxml",
    "pypdf2",
    "html2text",
    "thefuzz",
    "langchain_huggingface",
    "mellea==0.3.0",
]

[tool.setuptools.packages.find]
exclude = ["tests", "tests.*"]
namespaces = false

[project.urls]
Source = "https://github.com/IBM/FactReasoner"